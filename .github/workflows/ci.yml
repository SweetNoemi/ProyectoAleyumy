name: Integración Continua Proyecto Aleyumy

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Dar permisos al Maven Wrapper
        run: chmod +x aleyumy/mvnw

      - name: Compilar proyecto Spring Boot
        run: cd aleyumy && ./mvnw clean install
